name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install AOT deps
        run: sudo apt-get install -y clang zlib1g-dev
      - name: Publish
        run: |
          dotnet publish cdg/cdg.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishAot=true \
            -o ./out
          mv ./out/cdg ./out/cdg-linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: cdg-linux-x64
          path: ./out/cdg-linux-x64

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install AOT deps
        run: sudo apt-get install -y clang zlib1g-dev
      - name: Publish
        run: |
          dotnet publish cdg/cdg.csproj \
            -c Release \
            -r linux-arm64 \
            --self-contained true \
            -p:PublishAot=true \
            -o ./out
          mv ./out/cdg ./out/cdg-linux-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: cdg-linux-arm64
          path: ./out/cdg-linux-arm64
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publish
        run: |
          dotnet publish cdg/cdg.csproj \
            -c Release \
            -r osx-arm64 \
            --self-contained true \
            -p:PublishAot=true \
            -o ./out
          mv ./out/cdg ./out/cdg-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: cdg-macos-arm64
          path: ./out/cdg-macos-arm64

  release:
    needs: [build-linux-x64, build-linux-arm64, build-macos-x64, build-macos-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: ./out
      - name: Make binaries executable
        run: chmod +x ./out/*
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ./out/cdg-linux-x64
            ./out/cdg-linux-arm64
            ./out/cdg-macos-x64
            ./out/cdg-macos-arm64